version: '3.8'

services:
  # ─────────────────────────────────────────────────────────────
  # Football Analytics Platform - Main Application
  # ─────────────────────────────────────────────────────────────
  football-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: football-analytics-platform
    ports:
      - "8501:8501"  # Streamlit frontend
      - "8000:8000"  # FastAPI backend
    environment:
      # Snowflake Configuration
      SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT:-your_snowflake_account_here}
      SNOWFLAKE_USER: ${SNOWFLAKE_USER:-MARK}
      SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD}
      SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE:-sports_db}
      SNOWFLAKE_SCHEMA: ${SNOWFLAKE_SCHEMA:-analytics}
      SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE:-SPORTS_WH}
      SNOWFLAKE_ROLE: ${SNOWFLAKE_ROLE:-ACCOUNTADMIN}
      
      # Groq AI Configuration
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-mixtral-8x7b-32768}
      
      # FastAPI Configuration
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      
      # Python Configuration
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
    
    volumes:
      # Mount data directories for persistence (optional)
      - ./Final\ Dataset:/app/Final\ Dataset:ro
      - ./models:/app/models
      - ./ml_models:/app/ml_models:ro
    
    networks:
      - football-net
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

networks:
  football-net:
    driver: bridge

# ─────────────────────────────────────────────────────────────
# Usage:
#
# 1. Build the image:
#    docker-compose build
#
# 2. Create .env file with your credentials:
#    cp streamlit_app/backend/.env.example .env
#
# 3. Run the services:
#    docker-compose up
#
# 4. Access the application:
#    Streamlit: http://localhost:8501
#    FastAPI: http://localhost:8000/docs
#
# 5. View logs:
#    docker-compose logs -f
#
# 6. Stop services:
#    docker-compose down
# ─────────────────────────────────────────────────────────────
